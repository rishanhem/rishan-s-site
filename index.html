<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rishan Hemrajani</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --fg: #141414;
      --accent: #2f66f5;
      --accent-soft: rgba(47, 102, 245, 0.07);
      --accent-warm: rgba(255, 173, 89, 0.12);
      --muted: rgba(20, 20, 20, 0.62);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background:
        radial-gradient(720px 720px at 15% 18%, var(--accent-soft), transparent 60%),
        radial-gradient(540px 540px at 88% 25%, var(--accent-warm), transparent 55%),
        var(--bg);
      color: var(--fg);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 96px 24px 120px;
    }

    main {
      max-width: 960px;
      width: 100%;
      border-radius: 28px;
      padding: 72px 80px;
      background-color: rgba(255, 255, 255, 0.92);
      box-shadow: 0 20px 70px rgba(20, 20, 20, 0.12);
      transition: transform 160ms ease, box-shadow 160ms ease;
      display: grid;
      gap: 32px;
    }

    main:hover {
      transform: translateY(-6px);
      box-shadow: 0 26px 84px rgba(20, 20, 20, 0.16);
    }

    .profile {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(260px, 0.95fr);
      align-items: center;
      gap: 48px;
    }

    .profile img {
      width: clamp(240px, 28vw, 320px);
      height: clamp(260px, 32vw, 360px);
      object-fit: cover;
      border-radius: 28px;
      box-shadow: 0 24px 70px rgba(47, 102, 245, 0.18);
    }

    .profile-content {
      display: grid;
      gap: 24px;
    }

    h1 {
      font-size: clamp(2.8rem, 5vw, 3.8rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.05;
    }

    h1 span {
      color: var(--accent);
    }

    p {
      font-size: clamp(1.2rem, 2.2vw, 1.4rem);
      line-height: 1.75;
      color: var(--muted);
      font-weight: 400;
      max-width: 540px;
    }

    .tags {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }

    .tag {
      padding: 10px 20px;
      border-radius: 999px;
      background: rgba(47, 102, 245, 0.14);
      color: var(--accent);
      font-size: 0.95rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 600;
    }

    footer {
      margin-top: 16px;
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    @media (max-width: 640px) {
      .profile {
        flex-direction: column;
        display: flex;
        align-items: center;
        text-align: center;
        gap: 28px;
      }

      .profile img {
        width: 220px;
        height: 240px;
        border-radius: 24px;
      }

      main {
        padding: 40px 28px;
      }

      p {
        font-size: 1.05rem;
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="profile">
      <div class="profile-content">
        <h1>Hi, I’m <span>Rishan</span>.</h1>
        <p>I’m an activist and builder with a soft spot for community-based ideas. Right now, I’m finishing up senior year of high school while figuring out what comes next.</p>
      </div>
      <img src="assets/rishan.jpg" alt="Portrait of Rishan Hemrajani smiling" loading="lazy">
    </div>
    <footer>senior in high school · organizing for what matters</footer>
  </main>
</body>
</html>
